name = "it-toolbox"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "dist"

[vars]
ENVIRONMENT = "production"

# ============================================================
# Fork 用户注意：以下绑定需要在 Cloudflare Dashboard 手动配置
# 请勿直接修改此文件中的 ID，否则会导致与主分支冲突
# 详细配置步骤请参考 docs/DEPLOYMENT.md
# ============================================================

# [[kv_namespaces]]
# binding = "CACHE"
# id = "YOUR_KV_NAMESPACE_ID"
# preview_id 用于本地 wrangler pages dev 调试，与生产 id 必须不同
# 创建方式: wrangler kv namespace create CACHE --preview
# 将生成的 preview_id 填入下方（不可与生产 id 相同）
# preview_id = "YOUR_PREVIEW_KV_ID_HERE"

# [[r2_buckets]]
# binding = "FILES"
# bucket_name = "it-toolbox"

# [ai]
# binding = "AI"

# Secrets (set via: wrangler secret put SECRET_NAME)
# EXCHANGE_API_KEY
